<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseOS | Experiment Lab</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body data-page="lab">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">PulseOS</div>
      <nav>
        <a data-page="dashboard" href="dashboard.html">Dashboard</a>
        <a data-page="tasks" href="tasks.html">Task Manager</a>
        <a data-page="calendar" href="calendar.html">Calendar</a>
        <a data-page="analytics" href="analytics.html">Analytics</a>
        <a data-page="focus" href="focus.html">Focus Mode</a>
        <a data-page="lab" href="lab.html">Experiment Lab</a>
        <a data-page="profile" href="profile.html">Profile</a>
        <a data-page="settings" href="settings.html">Settings</a>
      </nav>
    </aside>
    <main class="app-content">
      <div class="topbar">
        <div>
          <h2 data-greeting>Experiment Lab</h2>
          <p data-date></p>
        </div>
        <div class="flex">
          <div class="chip" data-clock></div>
          <button class="btn ghost" data-logout>Logout</button>
        </div>
      </div>

      <section class="card glass">
        <div class="page-header">
          <h3>Log New Experiment</h3>
          <span class="badge">Productivity Science</span>
        </div>
        <form class="form-row" data-exp-form>
          <input class="input" name="name" placeholder="Experiment name" required />
          <select class="input" name="status">
            <option>Running</option>
            <option>Paused</option>
            <option>Completed</option>
          </select>
          <input class="input" name="days" type="number" placeholder="Days" required />
          <button class="btn" type="submit">Add</button>
        </form>
      </section>

      <section class="experiment-grid" style="margin-top:1.5rem;" data-experiments></section>
    </main>
  </div>
  <nav class="bottom-nav">
    <a data-page="dashboard" href="dashboard.html">Dashboard</a>
    <a data-page="tasks" href="tasks.html">Tasks</a>
    <a data-page="calendar" href="calendar.html">Calendar</a>
    <a data-page="focus" href="focus.html">Focus</a>
    <a data-page="analytics" href="analytics.html">Analytics</a>
    <a data-page="settings" href="settings.html">Settings</a>
  </nav>
  <script type="module" src="js/app.js"></script>
</body>
</html>
