<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseOS | Profile</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body data-page="profile">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">PulseOS</div>
      <nav>
        <a data-page="dashboard" href="dashboard.html">Dashboard</a>
        <a data-page="tasks" href="tasks.html">Task Manager</a>
        <a data-page="calendar" href="calendar.html">Calendar</a>
        <a data-page="analytics" href="analytics.html">Analytics</a>
        <a data-page="focus" href="focus.html">Focus Mode</a>
        <a data-page="lab" href="lab.html">Experiment Lab</a>
        <a data-page="profile" href="profile.html">Profile</a>
        <a data-page="settings" href="settings.html">Settings</a>
      </nav>
    </aside>
    <main class="app-content">
      <div class="topbar">
        <div>
          <h2 data-greeting>Identity Hub</h2>
          <p data-date></p>
        </div>
        <div class="flex">
          <div class="chip" data-clock></div>
          <button class="btn ghost" data-logout>Logout</button>
        </div>
      </div>

      <section class="card glass">
        <div class="profile-banner">
          <canvas id="avatar" class="avatar-canvas"></canvas>
          <div>
            <h3 data-profile-name>Nova</h3>
            <p data-profile-title>Productivity Architect</p>
            <div class="flex">
              <span class="badge" data-profile-level>Level 0</span>
              <span class="badge" data-profile-xp>0 XP</span>
            </div>
          </div>
          <button class="btn ghost" data-avatar-refresh>Regenerate</button>
        </div>
      </section>

      <section class="card glass" style="margin-top:1.5rem;">
        <h3>Profile Settings</h3>
        <form class="form-group" data-profile-form>
          <div class="form-row">
            <div class="form-group">
              <label>Name</label>
              <input class="input" name="name" />
            </div>
            <div class="form-group">
              <label>Title</label>
              <input class="input" name="title" />
            </div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input class="input" name="email" />
          </div>
          <button class="btn" type="submit">Update Profile</button>
        </form>
      </section>
    </main>
  </div>
  <nav class="bottom-nav">
    <a data-page="dashboard" href="dashboard.html">Dashboard</a>
    <a data-page="tasks" href="tasks.html">Tasks</a>
    <a data-page="calendar" href="calendar.html">Calendar</a>
    <a data-page="focus" href="focus.html">Focus</a>
    <a data-page="analytics" href="analytics.html">Analytics</a>
    <a data-page="settings" href="settings.html">Settings</a>
  </nav>
  <script type="module" src="js/app.js"></script>
</body>
</html>
