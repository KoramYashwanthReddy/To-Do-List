<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseOS | Settings</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body data-page="settings">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">PulseOS</div>
      <nav>
        <a data-page="dashboard" href="dashboard.html">Dashboard</a>
        <a data-page="tasks" href="tasks.html">Task Manager</a>
        <a data-page="calendar" href="calendar.html">Calendar</a>
        <a data-page="analytics" href="analytics.html">Analytics</a>
        <a data-page="focus" href="focus.html">Focus Mode</a>
        <a data-page="lab" href="lab.html">Experiment Lab</a>
        <a data-page="profile" href="profile.html">Profile</a>
        <a data-page="settings" href="settings.html">Settings</a>
      </nav>
    </aside>
    <main class="app-content">
      <div class="topbar">
        <div>
          <h2 data-greeting>System Settings</h2>
          <p data-date></p>
        </div>
        <div class="flex">
          <div class="chip" data-clock></div>
          <button class="btn ghost" data-logout>Logout</button>
        </div>
      </div>

      <section class="settings-grid">
        <form class="card glass" data-settings-form>
          <h3>Focus Engine</h3>
          <div class="form-group">
            <label>Focus length (min)</label>
            <input class="input" type="number" name="focusLength" />
          </div>
          <div class="form-group">
            <label>Break length (min)</label>
            <input class="input" type="number" name="breakLength" />
          </div>
          <div class="form-group">
            <label>Soundscape</label>
            <input class="input" name="soundscape" />
          </div>
          <div class="form-group">
            <label><input type="checkbox" name="autoSchedule" /> Auto-schedule tasks</label>
          </div>
          <div class="form-group">
            <label><input type="checkbox" name="notifications" /> Enable notifications</label>
          </div>
          <button class="btn" type="submit">Save Settings</button>
        </form>

        <div class="card glass">
          <h3>Data Vault</h3>
          <p>Export your entire productivity brain or import a backup.</p>
          <div class="flex" style="margin-top:1rem;">
            <button class="btn" data-export>Export JSON</button>
            <button class="btn ghost" data-backup>Save Snapshot</button>
          </div>
          <div class="form-group" style="margin-top:1rem;">
            <label>Import JSON</label>
            <input class="input" type="file" accept="application/json" data-import />
          </div>
        </div>
      </section>
    </main>\n  </div>\n`n  </div>`n
</html>



  <nav class="bottom-nav">
    <a data-page="dashboard" href="dashboard.html">Dashboard</a>
    <a data-page="tasks" href="tasks.html">Tasks</a>
    <a data-page="calendar" href="calendar.html">Calendar</a>
    <a data-page="focus" href="focus.html">Focus</a>
    <a data-page="analytics" href="analytics.html">Analytics</a>
    <a data-page="settings" href="settings.html">Settings</a>
  </nav>
  <script type="module" src="js/app.js"></script>
</body>\n</html>
